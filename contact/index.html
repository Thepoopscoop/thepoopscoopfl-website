<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>The Poop Scoop</title>

<link rel="icon" type="image/png" href="/images/favicon.png">

<meta name="description" content="Professional dog waste removal service serving Lake County, Florida. Weekly, biweekly, and one-time cleanups.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/style.css">

</head>

<body>

<header class="navbar">
    <div class="container">

        <a href="/" class="logo">
            <img src="/images/logo.png" alt="The Poop Scoop Dog Waste Removal">
        </a>

        <nav>
            <ul>
                <li><a href="/">Home</a></li>
                <li><a href="/pricing">Pricing</a></li>
                <li><a href="/faq">FAQ</a></li>
                <li><a href="/contact">Contact</a></li>
            </ul>
        </nav>

        <a href="/contact" class="quote-button">
            Get a Quote
        </a>

    </div>
</header>

<main>

<section class="contact-page">

    <div class="container">

        <h1>Get Started</h1>

        <p class="contact-intro">
            Ready for a cleaner yard? Fill out the form below and we'll get back to you as soon as possible.
        </p>

        <div class="contact-wrapper">

<form
    class="contact-form"
    action="https://formspree.io/f/mbdvqkgr"
    method="POST">

    <div class="form-group">

        <label for="name">Name</label>

        <input
            type="text"
            id="name"
            name="Name"
            placeholder="John Smith"
            required>

    </div>

    <div class="form-group">

        <label for="phone">Phone Number</label>

        <input
            type="tel"
            id="phone"
            name="Phone Number"
            placeholder="(407) 555-1234"
            required>

    </div>

    <div class="form-group">

        <label for="email">Email</label>

        <input
            type="email"
            id="email"
            name="Email"
            placeholder="john@email.com"
            required>

    </div>

    <div class="form-group">

        <label>How would you prefer we contact you?</label>

        <div class="checkbox-options">

            <label class="checkbox-option">
                <input
                    type="checkbox"
                    name="Preferred Contact Method[]"
                    value="Phone Call">
                <span>Phone Call</span>
            </label>

            <label class="checkbox-option">
                <input
                    type="checkbox"
                    name="Preferred Contact Method[]"
                    value="Text Message">
                <span>Text Message</span>
            </label>

            <label class="checkbox-option">
                <input
                    type="checkbox"
                    name="Preferred Contact Method[]"
                    value="Email">
                <span>Email</span>
            </label>

        </div>

    </div>

    <div class="form-group">

        <label for="address">Service Address</label>

        <input
            type="text"
            id="address"
            name="Service Address"
            placeholder="123 Main Street"
            required>

    </div>

    <div class="form-group">

        <label for="dogs">Number of Dogs</label>

        <select
            id="dogs"
            name="Number of Dogs"
            required>

            <option value="">Select...</option>
            <option>1</option>
            <option>2</option>
            <option>3</option>
            <option>4+</option>

        </select>

    </div>

    <div class="form-group">

        <label for="service">Requested Service</label>

        <select
            id="service"
            name="Requested Service"
            required>

            <option value="">Select...</option>
            <option>Weekly Service</option>
            <option>Twice Weekly</option>
            <option>One-Time Cleanup</option>

        </select>

    </div>

    <div class="form-group">

        <label for="notes">Anything else we should know?</label>

        <textarea
            id="notes"
            name="Notes"
            rows="5"
            placeholder="Gate codes, special instructions, questions..."></textarea>

    </div>

    <div class="checkbox-group">

        <label>

            <input
                type="checkbox"
                name="Customer Acknowledgement"
                required>

            I understand that all dogs must be kept indoors while service is being performed.

        </label>

    </div>

    <input
        type="hidden"
        name="_next"
        value="https://thepoopscoopfl.com/thanks">

    <input
        type="hidden"
        name="_subject"
        value="New Quote Request - The Poop Scoop">

    <button
        type="submit"
        class="primary-button">

        Request Free Quote

    </button>

</form>

        </div>

    </div>

</section>

</main>

<script src="/js/script.js"></script>

</body>

</html>
